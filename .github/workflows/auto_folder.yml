name: Alpha-Folder Otonom Dongu

on:
  workflow_dispatch: # Manuel tetikleme

permissions:
  contents: write # Dosya yazma izni acikca tanimlandi

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu Kopyala
        uses: actions/checkout@v4 # En guncel surum
        with:
          token: ${{ secrets.MY_GITHUB_TOKEN }}

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Bagimliliklari Yukle
        run: pip install requests google-generativeai

      - name: Makineyi Calistir
        env:
          MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py
