name: Alpha-Folder Otonom Dongu

on:
  workflow_dispatch: # Manuel tetikleme butonu
  schedule:
    - cron: '0 0 * * *' # Her gece 00:00'da otomatik calisir

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu Kopyala
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Gerekli Kutuphaneleri Yukle
        run: pip install requests

      - name: Makineyi Calistir
        env:
          MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py
